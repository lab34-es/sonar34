name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - run: npm test
        working-directory: frontend
